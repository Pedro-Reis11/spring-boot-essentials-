spring:
  application:
    name: spring-boot-essentials
  datasource:
      url: jdbc:mysql://localhost:3306/gym?createDatabaseIfNotExist=true
      username: ${MYSQL_USER}
      password: ${MYSQL_PASSWORD}
      #driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
      hibernate:
          ddl-auto: update
      show-sql: true
      properties:
            hibernate:
                format_sql: true